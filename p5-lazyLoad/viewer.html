<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sketch Viewer</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: auto !important;
      height: auto !important;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>

<body>
  <script src="../sketches2/libraries/p5.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sketchPath = params.get("sketch");

    if (sketchPath) {
      const script = document.createElement("script");
      script.src = sketchPath;
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
